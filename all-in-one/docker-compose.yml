services:
  # -- Reverse Proxy (New) --
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ui
      - user-management-backend
      - diversity-analysis
      - hierarchical-cumulative-voting
      - curriculum-skills
      - skill-ageing
      - giant-component-networks
      - occupational-demand-forecaster
    restart: unless-stopped

  # -- UI --
  ui:
    image: skillabproject/ui:0.1.148
    container_name: ui
    environment:
      - REACT_APP_API_URL_TRACKER_USERNAME=event_public
      - REACT_APP_API_URL_TRACKER_PASSWORD=PublicOnly2026
      - REACT_APP_API_URL_TRACKER=https://skillab-tracker.csd.auth.gr
      - REACT_APP_API_URL_KU_PUBLIC=https://se.uom.gr/skillab-public-ku-detection
      - REACT_APP_INSTALLATION=citizen
      # Updated internal paths routed through Nginx
      - REACT_APP_API_URL_USER_MANAGEMENT=http://localhost/api/user-management
      - REACT_APP_API_URL_SKILLS_DIVERSITY=http://localhost/api/diversity
      - REACT_APP_API_URL_SKILL_DEMAND_MATRIX=http://localhost/api/hcv
      - REACT_APP_API_URL_CURRICULUM_SKILLS=http://localhost/api/curriculum
      - REACT_APP_API_URL_SKILL_AGEING=http://localhost/api/skill-ageing
      - REACT_APP_API_URL_GIANT_COMPONENT_NETWORKS=http://localhost/api/gcn
      - REACT_APP_API_URL_OCCUPATIONAL_DEMAND_FORECASTER=http://localhost/api/forecaster
      - REACT_APP_API_URL_KU=http://localhost/api/user-management/ku-detection-backend
      - REACT_APP_API_URL_HIRING_MANAGEMENT=http://localhost/api/user-management/hiring-management-backend
      - REACT_APP_API_URL_EMPLOYEE_MANAGEMENT=http://localhost/api/user-management/employee-management-backend
    restart: unless-stopped
    ports:
      - "3000:3000"

  # -- User management --
  user-management-backend:
    image: skillabproject/user-management:0.1.89
    container_name: user-management-backend
    depends_on:
      - user-management-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-management-db:5432/test_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL-AUTO=update
      - SPRING_MAIL_USERNAME=aaaa@gmail.com
      - SPRING_MAIL_PASSWORD=aaaaaaaaaaaaaaaa
      - APP_INSTALLATION=citizen,industry,education,policy
      - APP_ADMIN_EMAIL=aaaa@gmail.com
      - APP_ADMIN_PASSWORD=aaaaaaaa
      - APP_ORGANIZATION_NAME=Organization
      - APP_JWT_SECRET=secretkey
      - FRONTEND_URL=http://localhost # Updated to standard HTTP port 80
      - TRACKER_API_URL=https://skillab-tracker.csd.auth.gr
      - TRACKER_API_USERNAME=event_public
      - TRACKER_API_PASSWORD=PublicOnly2026
      - KUDETECTION_SERVICE_URL=http://ku-detection-backend:5000
      - HIRING_SERVICE_URL=http://hiring-management-backend:8080
      - EMPLOYEEMANAGEMENT_SERVICE_URL=http://employee-management-backend:8001
    restart: unless-stopped
    ports:
      - "8081:8080"

  user-management-db:
    image: postgres:14.7
    container_name: user-management-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test_db
    restart: unless-stopped
    volumes:
      - user_management_postgresql_data:/var/lib/postgresql/data

  # -- diversity-analysis --
  diversity-analysis:
    image: skillabproject/diversity-analysis:0.1.41
    container_name: diversity-analysis
    environment:
      - URL=https://skillab-tracker.csd.auth.gr/api
      - USERNAME=event_public
      - PASSWORD=PublicOnly2026
    volumes:
      - diversity_data:/app/data
    restart: unless-stopped
    ports:
      - "8870:8870"

  # -- hierarchical-cumulative-voting --
  hierarchical-cumulative-voting:
    image: skillabproject/hierarchical-cumulative-voting:0.1.46
    container_name: hierarchical-cumulative-voting
    environment:
      - PYTHONUNBUFFERED=1
      - TRACKER_API=https://skillab-tracker.csd.auth.gr/api
      - USERNAME=event_public
      - PASSWORD=PublicOnly2026
    volumes:
      - app_hcv:/app/Completed_Analyses
    restart: unless-stopped
    ports:
      - "8872:8000"

  # -- curriculum-skills --
  curriculum-skills:
    depends_on:
      mysql-curriculum-skill:
        condition: service_healthy
    container_name: curriculum-skills
    image: skillabproject/curriculum-skills:0.1.134
    ports:
      - "5002:8000"
    volumes:
      - curriculum-curriculum:/app/curriculum
      - curriculum-crawler_json:/app/crawler_json
      - skill-gap-longterm:/app/longterm_storage
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_WORKERS=1
      - DB_HOST=mysql-curriculum-skill
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=skillcrawl
      - LONGTERM_STORAGE_DIR=/app/longterm_storage
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8000/curriculum-skills/health >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  mysql-curriculum-skill:
    image: skillabproject/mysql-curriculum-skill:20260423
    container_name: mysql-curriculum-skill
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillcrawl
    ports:
      - "5003:3306"
    volumes:
      - curriculum-skills_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -- skill-ageing --
  skill-ageing:
    image: skillabproject/skill-ageing:0.1.40
    container_name: skill-ageing
    environment:
      - TRACKER_API=https://skillab-tracker.csd.auth.gr/api
      - TRACKER_USERNAME=event_public
      - TRACKER_PASSWORD=PublicOnly2026
      - KU_API_URL=http://ku-detection-backend:5000
    volumes:
      - skill-ageing_analyses:/app/Completed_Analyses
    restart: unless-stopped
    ports:
      - "8002:8000"

  # -- giant-component-networks --
  giant-component-networks:
    image: skillabproject/giant-component-networks:0.1.24
    container_name: giant-component-networks
    environment:
      - TRACKER_API=https://skillab-tracker.csd.auth.gr/api
      - TRACKER_USERNAME=event_public
      - TRACKER_PASSWORD=PublicOnly2026
      - KU_API_URL=http://ku-detection-backend:5000
    volumes:
      - giant-component-networks_analyses:/app/Completed_Analyses
    restart: unless-stopped
    ports:
      - "8003:8000"

  # -- occupational-demand-forecaster --
  occupational-demand-forecaster:
    container_name: occupational-demand-forecaster
    image: skillabproject/occupational-demand-forecaster:0.1.6
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8877:8877"
    restart: unless-stopped

  # -- esco-plus-skills-extender --
  escoplus-skills-extender:
    image: skillabproject/escoplus-skills-extender:0.1.30
    container_name: escoplus-skills-extender
    environment:
      - TRACKER_API=https://skillab-tracker.csd.auth.gr/api
      - TRACKER_USERNAME=event_public
      - TRACKER_PASSWORD=PublicOnly2026
    volumes:
      - escoplus-skills-extender_analyses:/app/Completed_Analyses
    restart: unless-stopped
    ports:
      - "8004:8000"

  # -- role-classification --
  role-classification:
    image: skillabproject/role-classification:0.1.18
    container_name: role-classification
    environment:
      - TRACKER_API=https://skillab-tracker.csd.auth.gr/api
      - TRACKER_USERNAME=event_public
      - TRACKER_PASSWORD=PublicOnly2026
    restart: unless-stopped
    ports:
      - "8005:8000"
    volumes:
      - role-classification_analyses:/app/Completed_Analyses

  # -- KU Detection --
  ku-detection-backend:
    image: skillabproject/ku-detection:0.1.89
    container_name: ku-detection-backend
    depends_on:
      - ku-detection-db
    environment:
      - DB_HOST=ku-detection-db
      - DB_PORT=5432
      - DB_NAME=test
      - DB_USER=root
      - DB_PASSWORD=root
    restart: unless-stopped
    ports:
      - "5000:5000"

  ku-detection-db:
    image: postgres:16.2
    container_name: ku-detection-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test
    volumes:
      - ku_detection_postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped

  # -- hiring-management --
  hiring-management-backend:
    image: skillabproject/hiring-management-app:0.1.18
    container_name: hiring-management-backend
    ports:
      - "8890:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://employee-management-db:5432/labourpulse_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
    volumes:
      - hiring-cvs-data:/data/file-storage/cvs
    restart: unless-stopped

  # -- employee-management --
  employee-management-backend:
    image: skillabproject/employee-management-app:0.1.40
    container_name: employee-management-backend
    depends_on:
      employee-management-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://employee-management-db:5432/labourpulse_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO= validate
      - SPRING_LIQUIBASE_ENABLED= "true"
      - SPRING_LIQUIBASE_CHANGE_LOG= classpath:db/changelog/changelog-master.yaml
      - APP_ORGANIZATION_NAME=Organization
    ports:
      - "8888:8001"

  employee-management-db:
    image: postgres:16-alpine
    container_name: employee-management-db
    environment:
      - POSTGRES_DB=labourpulse_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - employee-management-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labourpulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  #  -- Digital policy management--
  backend-policy:
    image: skillabproject/policy:0.1.27
    container_name: backend-policy
    depends_on:
      - db-policy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-policy:5432/test_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=30a301d7257
    restart: unless-stopped
    ports:
      - "8085:8080"

  db-policy:
    image: postgres:14.7
    container_name: db-policy
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 30a301d7257
      POSTGRES_DB: test_db
    volumes:
      - policy_postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped

  # -- policy-success-evaluator --
  policy-success-evaluator:
    image: skillabproject/policy-success-evaluator:0.1.26
    container_name: policy-success-evaluator
    environment:
      POLICY_BASE: "http://backend-policy:8080"
    ports:
      - "8878:8878"
    restart: unless-stopped

  # -- future-technology-trends-identifier --
  future-technology-trends-identifier:
    image: skillabproject/future-technology-trends-identifier:0.1.13
    container_name: future-technology-trends-identifier
    ports:
      - "8876:8876"
    volumes:
      - future_technology_trends_identifier_storage:/app/storage
      - future_technology_trends_identifier_datasets:/app/esco_data
    restart: unless-stopped

volumes:
  user_management_postgresql_data:
  employee_management_postgresql_data:
  diversity_data:
  app_hcv:
  curriculum-skills_mysql:
  curriculum-curriculum:
  curriculum-crawler_json:
  skill-gap-longterm:
  skill-ageing_analyses:
  giant-component-networks_analyses:
  escoplus-skills-extender_analyses:
  role-classification_analyses:
  ku_detection_postgresql_data:
  hiring-cvs-data:
  employee-management-postgres-data:
  policy_postgresql_data:
  future_technology_trends_identifier_storage:
  future_technology_trends_identifier_datasets:
