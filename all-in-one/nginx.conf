server {
    listen 80;
    server_name localhost;

    # --- Massive Timeout & Upload Configurations (Moved here to prevent duplicates) ---
    client_max_body_size 500M;
    client_body_timeout 1800s;
    client_header_timeout 1800s;
    keepalive_timeout 1800s;
    send_timeout 1800s;

    # --- Cascading Reverse Proxy Timeouts ---
    proxy_connect_timeout 1800s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 1800s;

    # -- Route the UI --
    location / {
        proxy_pass http://ui:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Route the Local APIs (Strips the /api/ prefix) --
    location /api/user-management/ {
        proxy_pass http://user-management-backend:8080/;
        proxy_set_header Host $host;
    }

    location /api/diversity/ {
        proxy_pass http://diversity-analysis:8870/;
        proxy_set_header Host $host;
    }

    location /api/hcv/ {
        proxy_pass http://hierarchical-cumulative-voting:8000/;
        proxy_set_header Host $host;
    }

    location /api/curriculum/ {
        proxy_pass http://curriculum-skills:8000/;
        proxy_set_header Host $host;
    }

    location /api/skill-ageing/ {
        proxy_pass http://skill-ageing:8000/;
        proxy_set_header Host $host;
    }

    location /api/gcn/ {
        proxy_pass http://giant-component-networks:8000/;
        proxy_set_header Host $host;
    }

    location /api/forecaster/ {
        proxy_pass http://occupational-demand-forecaster:8877/;
        proxy_set_header Host $host;
    }
}